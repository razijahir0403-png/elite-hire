# Render Blueprint — deploy backend API from /server
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: elite-hire-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: false
      - key: SEED_ON_START
        value: true
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
